services:
  - type: web
    name: webhook-playground
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build && node scripts/migrate.js
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: webhook-playground-db
          property: connectionString
      - key: NEXT_PUBLIC_APP_URL
        sync: false

  - type: cron
    name: webhook-playground-cleanup
    runtime: node
    plan: starter
    schedule: "0 * * * *"
    buildCommand: npm ci
    startCommand: node scripts/cleanup.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: webhook-playground-db
          property: connectionString

databases:
  - name: webhook-playground-db
    databaseName: webhook_playground
    plan: free
