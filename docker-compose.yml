# Local Postgres for development. From repo root:
#   docker compose up -d
#   cp env.example .env.local
#   node scripts/migrate.js
#   npm run dev
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: webhook_playground
    ports:
      - "5432:5432"
    volumes:
      - webhook_pg_data:/var/lib/postgresql/data

volumes:
  webhook_pg_data:
